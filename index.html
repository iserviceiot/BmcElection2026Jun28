<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์ข้อมูลยุทธศาสตร์เลือกตั้ง ส.ก. 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #FDFBF7; }
        .bg-custom-green { background-color: #2E5A44; }
        .text-custom-green { color: #2E5A44; }
        .bg-custom-brown { background-color: #5D4037; }
        .hover-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="text-stone-800 min-h-screen">

    <header class="bg-stone-50 border-b border-stone-200">
        <div class="max-w-4xl mx-auto px-6 py-8">
            <h1 class="text-2xl md:text-3xl font-bold text-custom-green uppercase tracking-wide">
                ศูนย์ข้อมูลการเลือกตั้งสำหรับกลุ่มกรุงเทพฯ กลาง 6 เขต
            </h1>
            <p class="text-stone-600 mt-2 font-semibold">ของผู้สมัคร ส.ก.อิสระ กลุ่มคนทำงาน 2569</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-10">
        <section class="grid gap-4" id="link-container">
            <!-- Links will be generated by JavaScript -->
        </section>
    </main>

    <script>
        const links = [
            { url: "perception work party free all 6 cities.html", label: "ภาพจำเปรียบเทียบ อิสระ คนทำงาน พรรคการเมือง ใน 6 เขต" },
            { url: "perception work party free all dst in 6 cities.html", label: "ภาพจำเปรียบเทียบ อิสระ คนทำงาน พรรคการเมือง ทุกแขวง ใน 6 เขต" },
            { url: "perception work bkkbetter free all dst in 6 cities.html", label: "ภาพจำเปรียบเทียบ อิสระ คนทำงาน Better bangkok ทุกแขวง ใน 6 เขต" },
            { url: "perception 50 cities bkk_election_strategy_2026.html", label: "ภาพจำของสังกัดผู้สมัครทั้ง 50 เขต" },
            { url: "competitors all 6 cities.html", label: "เป้าหมายผู้ใช้สิทธิ กับผู้สมัครคู่แข่งขัน ส.ก.ใน 6 เขต" },
            { url: "Over All 6 cities.html", label: "ภาพรวมยุทธศาสตร์ ผู้สมัคร ส.ก.กลาง 6 เขต" },
            { url: "Over All dst 6 cities.html", label: "ภาพรวมยุทธศาสตร์ ผู้สมัคร ส.ก.กลาง ทุกแขวงใน 6 เขต" },
            { url: "candidate situation 6 cities.html", label: "สถานะผู้สมัคร คนทำงานทั้ง 6 เขต" },
            { url: "candidate competitor situation 6 cities.html", label: "สถานะผู้สมัครกับผู้แข่งขันทั้ง 6 เขต" }
        ];

        const container = document.getElementById('link-container');
        links.forEach(link => {
            const btn = document.createElement('a');
            btn.href = link.url;
            btn.className = "block bg-white border border-stone-200 p-6 rounded-xl shadow-sm hover-card hover:shadow-md hover:border-custom-green transition-all flex justify-between items-center group";
            btn.innerHTML = `
                <span class="font-medium text-lg text-stone-700 group-hover:text-custom-green">${link.label}</span>
                <span class="text-custom-green font-bold">→</span>
            `;
            container.appendChild(btn);
        });
    </script>

    <footer class="max-w-4xl mx-auto px-6 py-10 text-center text-stone-500 text-sm">
        <p>© 2026 ศูนย์ยุทธศาสตร์กลุ่มคนทำงาน</p>
    </footer>
</body>
</html>
